name: capstone

services:
  postgres:
    image: postgres:16-alpine
    container_name: capstone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-capstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-capstone}
      POSTGRES_DB: ${POSTGRES_DB:-capstone}
    volumes:
      - ../runtime/postgres:/var/lib/postgresql/data
    
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - capstone_internal

  pipeline:
    build:
      context: ..
      dockerfile: docker/pipeline/Dockerfile
    image: capstone-pipeline:local
    container_name: capstone-pipeline
    restart: unless-stopped
    env_file:
      - ${CAPSTONE_CONTAINER_ENV_FILE:-../.env}
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-capstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-capstone}
      POSTGRES_DB: ${POSTGRES_DB:-capstone}
      UV_CACHE_DIR: /workspace/.uv-cache
      GCE_METADATA_HOST: 169.254.169.254
      NO_PROXY: ${NO_PROXY:-169.254.169.254,metadata.google.internal}
      no_proxy: ${no_proxy:-169.254.169.254,metadata.google.internal}
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - ../data:/workspace/data
      - ../logs:/workspace/logs
      - ../target:/workspace/target
      - ../dbt_packages:/workspace/dbt_packages
      - ../.uv-cache:/workspace/.uv-cache
      - ../.secrets/gcp:/var/secrets/google:ro
    extra_hosts:
      - "metadata.google.internal:169.254.169.254"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import pandas, pyarrow, geopandas, pyproj, shapely, searoute; import google.cloud.storage, google.cloud.bigquery"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - capstone_internal

  dbt:
    image: capstone-pipeline:local
    container_name: capstone-dbt
    restart: unless-stopped
    env_file:
      - ${CAPSTONE_CONTAINER_ENV_FILE:-../.env}
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-capstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-capstone}
      POSTGRES_DB: ${POSTGRES_DB:-capstone}
      UV_CACHE_DIR: /workspace/.uv-cache
      GCE_METADATA_HOST: 169.254.169.254
      NO_PROXY: ${NO_PROXY:-169.254.169.254,metadata.google.internal}
      no_proxy: ${no_proxy:-169.254.169.254,metadata.google.internal}
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - ../data:/workspace/data
      - ../logs:/workspace/logs
      - ../target:/workspace/target
      - ../dbt_packages:/workspace/dbt_packages
      - ../.uv-cache:/workspace/.uv-cache
      - ../.secrets/gcp:/var/secrets/google:ro
    extra_hosts:
      - "metadata.google.internal:169.254.169.254"
    healthcheck:
      test:
        - CMD-SHELL
        - dbt --version >/dev/null 2>&1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      pipeline:
        condition: service_healthy
    networks:
      - capstone_internal

  orchestrator:
    build:
      context: ..
      dockerfile: docker/orchestrator/Dockerfile
      args:
        BASE_IMAGE: capstone-pipeline:local
    image: capstone-orchestrator:local
    container_name: capstone-orchestrator
    restart: unless-stopped
    env_file:
      - ${CAPSTONE_CONTAINER_ENV_FILE:-../.env}
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-capstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-capstone}
      POSTGRES_DB: ${POSTGRES_DB:-capstone}
      UV_CACHE_DIR: /workspace/.uv-cache
      GCE_METADATA_HOST: 169.254.169.254
      NO_PROXY: ${NO_PROXY:-169.254.169.254,metadata.google.internal}
      no_proxy: ${no_proxy:-169.254.169.254,metadata.google.internal}
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - ../data:/workspace/data
      - ../logs:/workspace/logs
      - ../target:/workspace/target
      - ../dbt_packages:/workspace/dbt_packages
      - ../.uv-cache:/workspace/.uv-cache
      - ../.secrets/gcp:/var/secrets/google:ro
    extra_hosts:
      - "metadata.google.internal:169.254.169.254"
    healthcheck:
      test:
        - CMD-SHELL
        - bruin version >/dev/null 2>&1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      pipeline:
        condition: service_healthy
      dbt:
        condition: service_healthy
    networks:
      - capstone_internal

networks:
  capstone_internal:
    driver: bridge
