        description: First calendar day of the month; primary date field for Looker Studio controls.
        tests:
          - not_null

      - name: period
        description: Integer month key in YYYYMM format.
        tests:
          - not_null

      - name: year_month
        description: Canonical month key in YYYY-MM format.
        tests:
          - not_null

      - name: total_trade_value_usd
        description: Reporter total monthly trade value in USD, suitable for scatter bubble size.

      - name: total_import_value_usd
        description: Reporter total monthly import value in USD.

      - name: energy_import_pct
        description: World Bank dependency-on-imported-energy indicator broadcast from annual reporter-year data to reporter-month grain. Net exporters can be negative.

      - name: renewable_share_pct
        description: World Bank renewable energy share percentage, broadcast from annual reporter-year data.

      - name: fossil_share_pct
        description: Fossil dependency percentage for the dashboard, using the reported World Bank fossil energy share only when it falls inside the expected 0-100 range and otherwise falling back to the bounded sum of oil, gas, and coal electricity shares as a proxy.

