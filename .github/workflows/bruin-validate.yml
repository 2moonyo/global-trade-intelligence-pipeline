name: Bruin Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  GCP_PROJECT_ID: ci-placeholder-project
  GCP_LOCATION: us-central1

jobs:
  bruin-config:
    name: Check Bruin Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bruin
        uses: bruin-data/setup-bruin@main

      - name: List Bruin Environments
        run: bruin environments list --config-file .bruin.yml

  bruin-validate:
    name: Validate ${{ matrix.pipeline_name }}
    needs: bruin-config
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pipeline_name: dataset_batch
            pipeline_path: ./bruin/pipelines/dataset_batch/pipeline.yml
          - pipeline_name: schedule_lane_queue
            pipeline_path: ./bruin/pipelines/schedule_lane_queue/pipeline.yml
          - pipeline_name: monthly_refresh
            pipeline_path: ./bruin/pipelines/monthly_refresh/pipeline.yml
          - pipeline_name: portwatch_bootstrap_phase_1
            pipeline_path: ./bruin/pipelines/portwatch_bootstrap_phase_1/pipeline.yml
          - pipeline_name: comtrade_bootstrap_day_1
            pipeline_path: ./bruin/pipelines/comtrade_bootstrap_day_1/pipeline.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bruin
        uses: bruin-data/setup-bruin@main

      - name: Validate Pipeline
        run: bruin validate --fast "${{ matrix.pipeline_path }}"
