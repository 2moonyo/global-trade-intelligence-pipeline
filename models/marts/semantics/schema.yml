      - name: reporter_country_name
        description: Standardized reporter country name for table labels and filters.

      - name: reporter_is_country_map_eligible
        description: True when the reporter is a canonical country suitable for country-map filters; detail rows are still retained when false upstream.

      - name: partner_iso3
        description: ISO3 code of the partner country.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_country')
                field: iso3

      - name: partner_country_name
        description: Standardized partner country name for partner-context visuals and filters.

      - name: partner_is_country_map_eligible
        description: True when the partner is a canonical country suitable for country-map filters; detail rows are still retained when false upstream.

      - name: cmd_code
        description: Commodity code at the conformed commodity grain.
        tests:
          - not_null
          - relationships:
              arguments:
