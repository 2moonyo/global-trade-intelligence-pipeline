        description: Share of the reporter's total monthly trade represented by the current partner-commodity chokepoint-exposed row.

      - name: partner_commodity_trade_share_of_reporter_chokepoint
        description: Share of the reporter's chokepoint-exposed monthly trade represented by the current partner-commodity row.

      - name: stress_index_weighted
        description: Weighted monthly chokepoint stress index repeated from the monthly chokepoint stress mart.

      - name: stress_deviation_score_capped
        description: Display-oriented capped deviation score for the row's chokepoint-month.

      - name: stress_severity_band
        description: Display-oriented severity label for the row's chokepoint-month.

      - name: event_active_flag
        description: True when one or more active events are linked to the row's chokepoint-month.
        tests:
          - not_null
          - accepted_values:
