                values: [true, false]

      - name: active_event_count
        description: Count of active events linked to the row's chokepoint-month.
        tests:
          - not_null

      - name: latest_month_flag
        description: True when the row belongs to the latest available month in this semantic mart.
        tests:
          - not_null
          - accepted_values:
              arguments:
                quote: false
                values: [true, false]

