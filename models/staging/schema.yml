version: 2

models:
  - name: stg_fx_monthly
    description: Standardized monthly FX context sourced from the canonical silver-backed raw FX monthly landing table, exposing both USD-base direct rates and EUR-base derived crosses.
    columns:
      - name: year_month
        description: Canonical month key in YYYY-MM format.
        tests:
          - not_null

      - name: currency_view
        description: Analytical FX view label such as USD_base or EUR_base.
        tests:
          - not_null

      - name: base_currency_code
        description: Base currency for the presented FX rate view.
        tests:
          - not_null

      - name: fx_currency_code
        description: Currency code for the quoted monthly FX series standardized to uppercase.
        tests:
          - not_null

      - name: fx_rate
        description: Average monthly FX rate expressed as quote currency units per one base currency unit for the selected currency_view.

      - name: fx_rate_to_usd
        description: USD per quoted currency unit, retained as a normalized comparison metric across currency views.

      - name: fx_mom_change
        description: Month-over-month percentage change in the presented view-specific monthly FX rate.

  - name: stg_brent_monthly
    description: Monthly Brent benchmark price series normalized for mart joins.
    columns:
      - name: year_month
        description: Canonical month key in YYYY-MM format.
        tests:
          - not_null

      - name: month_start_date
        description: First calendar day of the month.
        tests:
          - not_null

      - name: year
        description: Calendar year extracted from the monthly series.

      - name: month
        description: Calendar month number from 1 to 12.

      - name: benchmark_code
        description: Short code identifying the benchmark series.

      - name: benchmark_name
        description: Human-readable benchmark name.

      - name: region
        description: Geographic region associated with the benchmark series.

      - name: source_series_id
        description: Upstream provider series identifier.

      - name: avg_price_usd_per_bbl
        description: Average monthly oil price in USD per barrel.

      - name: min_price_usd_per_bbl
        description: Lowest observed daily price in the month in USD per barrel.

      - name: max_price_usd_per_bbl
        description: Highest observed daily price in the month in USD per barrel.

      - name: month_start_price_usd_per_bbl
        description: Opening price for the first trading day of the month in USD per barrel.

      - name: month_end_price_usd_per_bbl
        description: Closing price for the last trading day of the month in USD per barrel.

      - name: mom_abs_change_usd
        description: Month-over-month absolute price change in USD per barrel.

      - name: mom_pct_change
        description: Month-over-month percentage price change.

      - name: trading_day_count
        description: Number of trading days included in the monthly aggregation.

  - name: stg_comtrade_fact
    description: >
      Standardized staging view over stg_comtrade_trade_base.
      Exposes partner and routing keys used by downstream models while preserving
      the stable canonical grain key used for downstream lineage joins.
    columns:
      - name: canonical_grain_key
        description: Stable hashed key for reporter-partner-commodity-month-flow, reused by marts and provenance models.
        tests:
          - not_null

      - name: ref_date
        description: First day of the reference month as a date.
        tests:
          - not_null

      - name: period
        description: Integer month key in YYYYMM format.
        tests:
          - not_null

      - name: year_month
        description: Canonical month key in YYYY-MM format used for cross-source joins.
        tests:
          - not_null

      - name: ref_year
        description: Calendar year of the reference period.



      - name: qty
        description: Reported trade quantity in source units.

      - name: mot_code
        description: Source mode-of-transport code.

      - name: partner2_code
        description: Optional secondary partner code from source.

      - name: cmd_code
        description: Commodity code at the source grain (HS hierarchy).
        tests:
          - not_null

      - name: commodity_name_raw
        description: Raw commodity description as provided by the source.

      - name: trade_flow
        description: Source trade flow label, for example Import or Export.
        tests:
          - not_null

      - name: trade_value_usd
        description: Trade value in current USD.
        tests:
          - not_null

      - name: net_weight_kg
        description: Net traded weight in kilograms.

      - name: gross_weight_kg
        description: Gross traded weight in kilograms.

  - name: stg_comtrade_trade_base
    description: >
      Canonical cleaned Comtrade trade base at reporter-partner-commodity-month-flow grain.
      Applies naming cleanup, type casts, month standardization, exact-row deduplication,
      and stable canonical grain key generation for downstream facts and provenance.
    columns:
      - name: canonical_grain_key
        description: Stable hashed key for reporter-partner-commodity-month-flow used to join the canonical fact back to provenance.
        tests:
          - not_null

      - name: ref_date
        description: First day of the reference month as a date.
        tests:
          - not_null

      - name: period
        description: Integer month key in YYYYMM format.
        tests:
          - not_null

      - name: year_month
        description: Canonical month key in YYYY-MM format.
        tests:
          - not_null

      - name: ref_year
        description: Calendar year of the reference period.



      - name: cmd_code
        description: Commodity code at source commodity grain.
        tests:
          - not_null

      - name: commodity_name_raw
        description: Raw commodity description as provided by source.

      - name: trade_flow
        description: Standardized trade flow label.
        tests:
          - not_null

      - name: trade_value_usd
        description: Trade value in current USD.
        tests:
          - not_null

      - name: net_weight_kg
        description: Net traded weight in kilograms.

      - name: gross_weight_kg
        description: Gross traded weight in kilograms.

      - name: qty
        description: Reported trade quantity in source units.

      - name: mot_code
        description: Source mode-of-transport code.

      - name: partner2_code
        description: Optional secondary partner code from source.

  - name: stg_dim_commodity
    description: Commodity dimension standardized from Comtrade source metadata.
    columns:
      - name: cmd_code
        description: Commodity code used as the primary commodity key.
        tests:
          - not_null

      - name: hs2
        description: Two-digit HS chapter code.

      - name: hs4
        description: Four-digit HS heading code.

      - name: hs6
        description: Six-digit HS subheading code.

      - name: commodity_name
        description: Normalized commodity description.

      - name: commodity_group
        description: Higher-level commodity grouping used in analysis.

      - name: food_flag
        description: True when the commodity is classified as food-related.

      - name: energy_flag
        description: True when the commodity is classified as energy-related.

      - name: industrial_flag
        description: True when the commodity is classified as industrial-related.

  - name: stg_dim_country
    description: Country dimension with region tags and analytical membership flags.
    columns:
      - name: country_code
        description: Numeric country code used by the source system.
        tests:
          - not_null



      - name: country_name
        description: Display name of the country.

      - name: region
        description: Source-provided geographic region.

      - name: subregion
        description: Source-provided geographic subregion.

      - name: continent
        description: Continent label used in dimensional rollups.

      - name: is_eu
        description: True when the country is part of the European Union.

      - name: is_oecd
        description: True when the country is part of the OECD.

  - name: stg_dim_time
    description: >
      Canonical monthly time dimension generated in dbt from the observed month
      coverage of trade, PortWatch, Brent, FX, energy, and event sources, with
      configurable lead and lag month buffers.
    columns:
      - name: period
        description: Integer month key in YYYYMM format.
        tests:
          - not_null
          - unique

      - name: year
        description: Calendar year as integer.

      - name: month
        description: Calendar month number from 1 to 12.

      - name: quarter
        description: Calendar quarter number from 1 to 4.

      - name: year_month
        description: Canonical month label in YYYY-MM format.
        tests:
          - not_null
          - unique

      - name: month_start_date
        description: First calendar day of the month generated for the conformed monthly calendar.

  - name: stg_dim_trade_flow
    description: Trade flow dimension standardized from Comtrade metadata.
    columns:
      - name: flow_code
        description: Short code for trade flow type.
        tests:
          - not_null

      - name: flow_desc
        description: Human-readable trade flow description.

      - name: flow_group
        description: Group label for related trade flow codes.

  - name: stg_route_applicability
    description: Route applicability bridge for reporter-partner pairs.
    columns:


      - name: row_count
        description: Number of source records represented by the bridge row.

      - name: trade_value_usd
        description: Total trade value represented by the bridge row in current USD.

      - name: has_sea
        description: True when at least one sea route mode is observed.

      - name: has_inland_water
        description: True when inland waterway mode is observed.

      - name: has_unknown
        description: True when the mode-of-transport code includes unknown values.

  - name: stg_energy_vulnerability
    description: >
      Standardized long-format World Bank energy vulnerability indicators at
      reporter-year-indicator grain.
    columns:


      - name: year
        description: Calendar year of the annual indicator value.
        tests:
          - not_null

      - name: period
        description: Synthetic compatibility period as YYYY01 for annual indicators.

      - name: year_month
        description: Synthetic compatibility month label as YYYY-01 for annual indicators.
        tests:
          - not_null

      - name: indicator_code
        description: Normalized indicator code used for long-format analytics joins.
        tests:
          - not_null

      - name: indicator_value
        description: Numeric indicator value; may be null when source has missing observations.

      - name: grain_key
        description: Surrogate grain key for reporter + year + indicator_code.
        tests:
          - not_null

      - name: has_non_marine
        description: True when non-marine transport modes are present.

      - name: mot_codes_seen
        description: Encoded list of mode-of-transport codes seen for the pair.

      - name: route_applicability_status
        description: Derived status describing route applicability for the pair.

  - name: stg_chokepoint_bridge
    description: Event-month chokepoint bridge with activity flags.
    columns:
      - name: event_id
        description: Stable identifier for the event record.
        tests:
          - not_null

      - name: event_name
        description: Name of the event associated with the chokepoint.

      - name: year_month
        description: Canonical month key in YYYY-MM format.
        tests:
          - not_null

      - name: month_start_date
        description: First calendar day of the event month.

      - name: chokepoint_name
        description: Name of the affected maritime chokepoint.

      - name: event_phase
        description: Lifecycle phase of the event for the month.

      - name: is_event_active
        description: True when the event is active in the month.

      - name: is_lead_period
        description: True when the row belongs to the event lead window.

      - name: is_lag_period
        description: True when the row belongs to the event lag window.

      - name: severity_weight
        description: Numeric event severity weight used in exposure calculations.

      - name: is_global_event
        description: True when the event is treated as globally scoped.

      - name: event_type
        description: Event taxonomy label.

      - name: event_scope
        description: Scope label indicating geographic or analytical reach.

      - name: link_role
        description: Relationship role between event and chokepoint.

  - name: stg_portwatch_stress_metrics
    description: >
      Canonical PortWatch stress metrics model derived in dbt from the raw monthly
      PortWatch fact. Produces expanding point-in-time component z-scores and
      stress indices, plus rolling 6-month companion metrics for short-horizon
      monitoring. Backfills automatically change forward-looking rows because the
      expanding and rolling windows are rebuilt from the raw monthly history.
    columns:
      - name: chokepoint_id
        description: Canonical analytics chokepoint identifier derived from chokepoint_name for consistent joins to event and exposure marts.
        tests:
          - not_null

      - name: portwatch_source_chokepoint_id
        description: Source PortWatch chokepoint identifier carried through from the raw monthly fact for lineage and backfill audits.
        tests:
          - not_null

      - name: year_month
        description: Canonical month key in YYYY-MM format.
        tests:
          - not_null

      - name: month_start_date
        description: First calendar day of the month.

      - name: avg_n_total
        description: Monthly traffic count intensity from PortWatch.

      - name: avg_capacity
        description: Monthly throughput proxy from PortWatch.

      - name: z_score_capacity
        description: Expanding point-in-time z-score for throughput.

      - name: z_score_count
        description: Expanding point-in-time z-score for traffic count.

      - name: z_score_vessel_size
        description: Expanding point-in-time z-score for capacity-per-movement.

      - name: stress_index
        description: Expanding blended stress index computed as 0.5 * z_score_count + 0.5 * z_score_capacity.

      - name: stress_index_weighted
        description: Expanding stress index weighted by the chokepoint-specific priority vessel share.

      - name: stress_index_rolling_6m
        description: Rolling 6-month blended stress index using only prior calendar months.

      - name: stress_index_weighted_rolling_6m
        description: Rolling 6-month weighted stress index using the same vessel-share weighting logic.

  - name: stg_chokepoint_stress_zscore
    description: >
      Compatibility projection over stg_portwatch_stress_metrics.
      Exposes the expanding point-in-time component z-scores used by event-impact
      analytics while keeping the existing model interface stable.
    columns:
      - name: chokepoint_id
        description: Stable chokepoint identifier derived from the raw monthly PortWatch fact.
        tests:
          - not_null

      - name: year_month
        description: Canonical month key in YYYY-MM format.
        tests:
          - not_null

      - name: throughput
        description: Monthly throughput proxy sourced from PortWatch avg_capacity.

      - name: mean_throughput
        description: Expanding point-in-time baseline mean throughput by chokepoint using prior months only.

      - name: stddev_throughput
        description: Expanding point-in-time population standard deviation of throughput by chokepoint using prior months only.

      - name: z_score
        description: Expanding point-in-time throughput z-score computed as (throughput - mean_throughput) / stddev_throughput.

      - name: z_score_capacity
        description: Capacity-based z-score alias for throughput signal, computed with the same expanding point-in-time baseline as z_score.

      - name: avg_n_total
        description: Monthly traffic count intensity from PortWatch avg_n_total.

      - name: z_score_count
        description: Expanding point-in-time count-based z-score computed from prior months only.

      - name: vessel_size_index
        description: Capacity-per-movement indicator computed as throughput / avg_n_total with safe zero handling.

      - name: z_score_vessel_size
        description: Expanding point-in-time z-score of vessel_size_index over prior months only.
