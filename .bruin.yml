default_environment: default

environments:
  default:
    connections:
      google_cloud_platform:
        - name: gcp-default
          project_id: ${GCP_PROJECT_ID}
          location: ${GCP_LOCATION}
          use_application_default_credentials: true

  production:
    connections:
      google_cloud_platform:
        - name: gcp-default
          project_id: ${GCP_PROJECT_ID}
          location: ${GCP_LOCATION}
          use_application_default_credentials: true
