version: 2

models:
  - name: dim_country
    description: "Conformed country dimension promoted from staging for BI-facing marts and dashboard joins."
    columns:
      - name: iso3
        description: "ISO3 code for the country."
        tests: [not_null, unique]
      - name: country_name
        description: "Canonical business-readable country name for BI display and Looker Studio country geography."
      - name: is_country_group
        description: "True when the row is an aggregate, group, world, or special geography bucket rather than a renderable country."
      - name: is_country_map_eligible
        description: "True when the row is a canonical country suitable for Looker Studio Geo Country rendering."

  - name: dim_time
    description: "Conformed month dimension for all trade, macro, energy, and event marts."
    columns:
      - name: month_key
        description: "Surrogate month key in YYYYMM format."
        tests: [not_null, unique]
      - name: year_month
        description: "Canonical month label in YYYY-MM format."
        tests: [not_null, unique]

  - name: dim_commodity
    description: "Conformed commodity dimension promoted from staging for trade reporting and Looker exploration."
    columns:
      - name: cmd_code
        description: "Commodity code at the warehouse commodity grain."
        tests: [not_null, unique]
      - name: commodity_name
        description: "Business-readable commodity name."

  - name: dim_trade_flow
    description: "Conformed trade flow dimension exposing standardized flow descriptions and groups."
    columns:
      - name: flow_code
        description: "Standardized trade flow code."
        tests: [not_null, unique]

  - name: dim_chokepoint
    description: "Conformed chokepoint dimension aligned across routing, events, and PortWatch monitoring."
    columns:
      - name: chokepoint_id
        description: "Stable hashed chokepoint key."
        tests: [not_null, unique]
      - name: chokepoint_name
        description: "Business-readable chokepoint name."
        tests: [not_null]
      - name: chokepoint_kind
        description: "Routing-backed chokepoint classification such as canal, strait, or cape."
      - name: longitude
        description: "Chokepoint longitude in decimal degrees."
      - name: latitude
        description: "Chokepoint latitude in decimal degrees."
      - name: zone_of_influence_radius_m
        description: "Radius in meters used to build the circular chokepoint zone of influence."
      - name: chokepoint_point_wkb
        description: "WKB-encoded point geometry for the chokepoint centroid."
      - name: zone_of_influence_wkb
        description: "WKB-encoded polygon geometry for the chokepoint zone of influence."
      - name: chokepoint_point_geog
        description: "BigQuery geography generated from the chokepoint centroid WKB."
      - name: zone_of_influence_geog
        description: "BigQuery geography generated from the zone-of-influence WKB."
      - name: geo_point
        description: "BigQuery point geography generated from longitude and latitude for GIS usage."
