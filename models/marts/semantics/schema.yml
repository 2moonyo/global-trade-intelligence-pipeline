      - name: exposed_chokepoint_count
        description: Count of distinct chokepoints carrying exposed reporter trade in the month.

      - name: historical_event_count
        description: Cumulative count of distinct active disruption events historically linked to the reporter through exposed chokepoints as of the selected month.

      - name: avg_event_severity
        description: Average severity weight across historical reporter-linked events as of the selected month.

      - name: max_event_severity
        description: Maximum severity weight across historical reporter-linked events as of the selected month.

      - name: most_recent_event_date
        description: Most recent event start date among historical reporter-linked events as of the selected month.

      - name: top_supplier_iso3
        description: ISO3 code for the reporter's largest country supplier by monthly import value.

      - name: top_supplier_name
        description: Business-readable name for the reporter's largest country supplier by monthly import value.

      - name: top_supplier_share_pct
        description: Percent of country-supplier import value represented by the top supplier.

      - name: supplier_concentration_pct
        description: Import concentration percentage currently equal to top supplier share; kept as a business-facing dependency measure.

      - name: top_commodity_code
        description: Top imported commodity code for the reporter-month.

      - name: top_commodity_name
        description: Business-readable top imported commodity name for the reporter-month.

      - name: top_commodity_import_share_pct
        description: Percent of total reporter imports represented by the top imported commodity.

      - name: structural_risk_score
        description: Weighted 0-100 structural vulnerability score combining energy import dependence, chokepoint exposure, renewable gap, fossil dependence, supplier concentration, and event history.

      - name: risk_band
        description: Display band for structural_risk_score.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Critical', 'High', 'Medium', 'Lower']

      - name: structural_vulnerability_input_status
        description: Diagnostic label showing whether core Page 5 inputs are complete for the reporter-month.

      - name: structural_risk_rank_in_month
        description: Rank of reporter structural vulnerability score inside the month; use 1 for highest-risk scorecards.

      - name: is_highest_structural_risk_reporter
        description: True for the reporter with the highest structural risk score in the month.
